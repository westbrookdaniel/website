<!doctype html>
<html lang="en">
  <head>
    {{ template "head" }}
    <title>{{ .Title }} - Daniel Westbrook</title>
  </head>
  <body>
    {{ template "header" }}


    <div class="hero">
      <h1 class="mb-8">{{ .Title }}</h1>
      <div>
        <p class="m-0">{{ .Description }}</p>
        <p class="m-0">{{ .Date.Format "02 Jan 2006" }}</p>
      </div>
    </div>

    {{ .Content }}

    <div style="padding-top: 2rem">
      <a class="button active" href="/blog">All Posts</a>
    </div>

    {{ template "footer" }}
  </body>
</html>
